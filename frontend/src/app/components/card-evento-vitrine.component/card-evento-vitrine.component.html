<article [class]="classesBase + ' ' + classesDimensoes()">

    <div class="relative h-48 w-full bg-gray-200 shrink-0">
        <img [src]="data().imagemUrl" [alt]="data().titulo" class="w-full h-full object-cover">

        <div
            class="absolute -bottom-5 left-6 bg-blue-500 text-white rounded-xl px-4 py-2 flex flex-col items-center shadow-lg">
            <span class="text-xs font-bold uppercase">{{ data().dataInicio | date:'MMM' }}</span>
            <span class="text-xl font-black leading-none">{{ data().dataInicio | date:'dd' }}</span>
        </div>
    </div>

    <div class="p-6 pt-10 flex flex-col flex-grow ">

        <h3 class="text-lg font-bold text-azul-coe-escurissimo mb-2 line-clamp-2">
            {{ data().titulo }}
        </h3>

        <p class="text-sm text-gray-500 line-clamp-2 mb-4">
            {{ data().descricao || 'Nenhuma descrição disponível para este evento.' }}
        </p>

        <div class="space-y-2 mt-auto pt-4 border-t border-gray-100">
            <div class="flex items-center gap-2 text-xs text-gray-600 font-medium">
                <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span>{{ data().dataInicio | date:'dd/MM/yyyy' }}</span>
            </div>

            <div class="flex items-center gap-2 text-xs text-gray-600 font-medium">
                <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="truncate">{{ data().local }}</span>
            </div>
        </div>

    </div>

    <a [routerLink]="['/eventos', data().slug]" class="absolute inset-0 z-10" aria-label="Ver detalhes do evento"></a>
</article>
